name: Translator

options:
  bundleIdPrefix: com.d0ne1s
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "1.10.0"

targets:
  Translator:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: KeyboardShortcuts
      - sdk: libsqlite3.tbd
    info:
      path: Generated/Info.plist
      properties:
        # メニューバー常駐（Dock アイコンを出さない accessory アプリ）
        LSUIElement: true
        # 版数はビルド設定から流す。XcodeGen 既定の 1.0 / 1 固定を上書きし、
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION（release.sh が bump する値）を反映させる。
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # アプリアイコン（Assets.xcassets の AppIcon）。actool が注入する値を明示。
        CFBundleIconName: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.d0ne1s.translate
        MARKETING_VERSION: "0.1.6"
        CURRENT_PROJECT_VERSION: "20260608100117"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # アプリアイコン（Assets.xcassets の AppIcon を asset catalog からコンパイル）
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # 安定した署名 ID（Developer ID Application / Team VYDUR99LAM）で署名。
        # リビルドしても署名 ID が変わらないため TCC（アクセシビリティ）許可が保持される。
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "85D91870B2836DB303E2224A2D8D56051F26A6FB"
        DEVELOPMENT_TEAM: "VYDUR99LAM"
        # Debug はデバッガ接続を妨げないため Hardened Runtime を無効のまま。
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: complete
      # Release だけ Hardened Runtime を有効化（notarize の必須要件）。
      # TCC 許可は cdhash（designated requirement）基準なので、Release/Debug の構成差は許可保持に影響しない。
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES

schemes:
  Translator:
    build:
      targets:
        Translator: all
    run:
      config: Debug
    archive:
      config: Release
