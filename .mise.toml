# ランタイム（Swift）は Xcode 同梱を使うため [tools] は指定しない。

[tasks.regen]
description = "project.yml から Xcode プロジェクトを再生成する"
run = "xcodegen generate"

[tasks.build]
description = "アプリをビルドする（Debug・ad-hoc 署名）"
run = """
xcodegen generate
xcodebuild -scheme Translate -configuration Debug -derivedDataPath .build -destination 'generic/platform=macOS' build
"""

[tasks.run]
description = "ビルドして起動する（メニューバーに常駐）"
run = """
xcodegen generate
xcodebuild -scheme Translate -configuration Debug -derivedDataPath .build -destination 'generic/platform=macOS' build
open .build/Build/Products/Debug/Translate.app
"""

[tasks.kill]
description = "起動中の Translate を終了する"
run = "killall Translate 2>/dev/null || true"

[tasks.build-release]
description = "配布アーティファクトを作る（Release ビルド→署名→notarize→staple→build/Translate.zip）"
run = "./scripts/build-release.sh"

[tasks.release]
description = "リリースする（bump→build-release→push→GitHub Release→Cask 更新）。引数: patch|minor|major|x.y.z（既定 patch）"
usage = 'arg "<bump>" default="patch" help="patch|minor|major|x.y.z"'
run = './scripts/release.sh "$usage_bump"'
