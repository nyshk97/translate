# ランタイム（Swift）は Xcode 同梱を使うため [tools] は指定しない。

[tasks.regen]
description = "project.yml から Xcode プロジェクトを再生成する"
run = "xcodegen generate"

[tasks.build]
description = "アプリをビルドする（Debug・Developer ID 署名）"
run = """
xcodegen generate
xcodebuild -project Translator.xcodeproj -scheme Translator -configuration Debug -derivedDataPath .build -destination 'generic/platform=macOS' build
"""

[tasks.run]
description = "開発ビルドを起動（先に起動中の Translator を終了して競合回避）"
run = """
killall Translator 2>/dev/null || true
xcodegen generate
xcodebuild -project Translator.xcodeproj -scheme Translator -configuration Debug -derivedDataPath .build -destination 'generic/platform=macOS' build
open .build/Build/Products/Debug/Translator.app
"""

[tasks.kill]
description = "起動中の Translator を終了する"
run = "killall Translator 2>/dev/null || true"

[tasks.use-release]
description = "開発ビルドを終了してリリース版（/Applications）に戻す"
run = """
killall Translator 2>/dev/null || true
open /Applications/Translator.app
"""

[tasks.build-release]
description = "配布アーティファクトを作る（Release ビルド→署名→notarize→staple→build/Translator.zip）"
run = "./scripts/build-release.sh"

[tasks.release]
description = "リリースする（bump→build-release→push→GitHub Release→Cask 更新）。引数: patch|minor|major|x.y.z（既定 patch）"
usage = 'arg "<bump>" default="patch" help="patch|minor|major|x.y.z"'
run = './scripts/release.sh "$usage_bump"'
